            find ./packages -name "electron-bundler" -type d | grep -v "node_modules" || echo "No electron-bundler directory found"
          fi

          # Check if bundler build succeeded
          if [ ! -z "$BUNDLER_DIR" ] && [ -d "$BUNDLER_DIR/dist" ]; then
